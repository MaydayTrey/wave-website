<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Neurotechnology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #1247B5;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── INTRO ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.8s ease;
    }

    #intro.fade-away { opacity: 0; pointer-events: none; }

    #intro-bg {
      position: absolute;
      inset: 0;
      background: #1247B5;
      filter: blur(18px);
      transform: scale(1.05);
    }

    #intro-scrim {
      position: absolute;
      inset: 0;
      background: rgba(6, 22, 70, 0.72);
    }

    #begin-btn {
      position: relative;
      z-index: 2;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.85);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 18px 52px;
      border-radius: 100px;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
      animation: beginPulse 3s ease-in-out infinite;
    }

    #begin-btn:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.95);
      box-shadow: 0 0 24px rgba(255,255,255,0.25), 0 0 60px rgba(180,210,255,0.15);
      animation: none;
    }

    @keyframes beginPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
      50%       { box-shadow: 0 0 20px rgba(255,255,255,0.2), 0 0 40px rgba(180,210,255,0.1); border-color: rgba(255,255,255,0.65); }
    }

    /* ── WAVE INTRO OVERLAY ── */
    #wave-intro {
      position: fixed;
      inset: 0;
      z-index: 900;
      pointer-events: none;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1247B5;
      transition: opacity 0.3s ease;
    }

    #wave-intro.active  { opacity: 1; }
    #wave-intro.fade-out { opacity: 0; transition: opacity 1.2s ease; }

    #wave-svg {
      width: min(320px, 55vw);
      height: auto;
      opacity: 0;
    }

    /* ── MAIN PAGE ── */
    #page-wrap {
      opacity: 0;
      transition: opacity 1s ease;
    }

    #page-wrap.visible { opacity: 1; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 40px;
      height: 64px;
      background: rgba(18, 71, 181, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      transition: opacity 0.6s ease;
    }

    nav.hidden { opacity: 0; pointer-events: none; }

    .nav-logo { height: 32px; width: auto; justify-self: center; }

    .nav-left {
      display: flex;
      justify-content: flex-start;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
    }

    .nav-left a, .nav-right a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-left a:hover, .nav-right a:hover { color: #fff; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 28px;
      transition: opacity 0.5s ease;
    }

    .hero.fade-out { opacity: 0; pointer-events: none; }

    .hero-logo { width: min(520px, 75vw); height: auto; }

    /* ── TAGLINE ── */
    .hero-tagline {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.55);
      margin-top: -8px;
      cursor: pointer;
      text-shadow: 0 0 12px rgba(255,255,255,0.25), 0 0 30px rgba(180,210,255,0.15);
      animation: taglinePulse 3s ease-in-out infinite;
      transition: color 0.3s, text-shadow 0.3s;
      user-select: none;
    }

    .hero-tagline:hover {
      color: rgba(255,255,255,0.95);
      text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 30px rgba(180,210,255,0.7), 0 0 60px rgba(150,190,255,0.4);
      animation: none;
    }

    @keyframes taglinePulse {
      0%, 100% { color: rgba(255,255,255,0.55); text-shadow: 0 0 12px rgba(255,255,255,0.2), 0 0 30px rgba(180,210,255,0.1); }
      50%       { color: rgba(255,255,255,0.8);  text-shadow: 0 0 16px rgba(255,255,255,0.5), 0 0 40px rgba(180,210,255,0.3); }
    }

    /* ── SOCIAL ROW ── */
    .social-row { display: flex; gap: 20px; align-items: center; }

    .social-link {
      width: 44px; height: 44px;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.4s;
    }

    .social-link:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.7);
      color: #fff;
    }

    .social-link svg { width: 18px; height: 18px; fill: currentColor; }
    .social-link .stroke-icon { fill: none; stroke: currentColor; stroke-width: 1.8px; }

    .social-link.email-glow {
      border-color: rgba(255,255,255,0.9);
      color: #fff;
      animation: emailPulse 2.5s ease-in-out infinite;
      animation-delay: 0s;
    }

    /* glow builds from nothing */
    @keyframes emailGlowIn {
      from { box-shadow: none; border-color: rgba(255,255,255,0.35); }
      to   { box-shadow: 0 0 16px rgba(255,255,255,0.8), 0 0 40px rgba(180,210,255,0.5); border-color: rgba(255,255,255,1); }
    }

    @keyframes emailPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255,255,255,0.4), 0 0 20px rgba(180,210,255,0.2); border-color: rgba(255,255,255,0.6); }
      50%       { box-shadow: 0 0 16px rgba(255,255,255,0.8), 0 0 40px rgba(180,210,255,0.5); border-color: rgba(255,255,255,1); }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
      transition: opacity 0.5s ease;
    }

    footer.fade-out { opacity: 0; }

    /* ── DEMO OVERLAY ── */
    #demo-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }

    #demo-overlay.visible { opacity: 1; pointer-events: all; }

    .demo-word {
      font-size: 8vw;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: #fff;
      text-transform: uppercase;
      opacity: 0;
      transform: scale(0.2);
      transition: opacity 0.6s ease, transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      margin-bottom: 3rem;
      text-shadow: 0 0 40px rgba(255,255,255,0.3);
    }

    .demo-word.expanded { opacity: 1; transform: scale(1); }

    .demo-video-wrap {
      width: min(860px, 88vw);
      aspect-ratio: 16/9;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.5s 0.5s ease, transform 0.5s 0.5s ease;
    }

    .demo-video-wrap.visible { opacity: 1; transform: translateY(0); }
    .demo-video-wrap iframe { width: 100%; height: 100%; border: none; }

    .video-placeholder-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.25);
      font-size: 0.9rem; font-weight: 300; letter-spacing: 0.08em;
    }

    .demo-close {
      position: absolute;
      top: 28px; right: 36px;
      background: none;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.6);
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem; font-weight: 300;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 100px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.4s 0.8s ease, color 0.2s, border-color 0.2s;
    }

    #demo-overlay.visible .demo-close { opacity: 1; }
    .demo-close:hover { color: #fff; border-color: rgba(255,255,255,0.8); }
  </style>
</head>

  <script>
    /* ── WAVE REVEAL ANIMATION ── */
    const waveIntro  = document.getElementById('wave-intro');
    const waveSvg    = document.getElementById('wave-svg');
    const revealRect = document.getElementById('reveal-rect');

    function animateWave(onComplete) {
      waveSvg.style.opacity = '1';
      const duration = 1300;
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        revealRect.setAttribute('x', -500 + (500 * eased));
        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          setTimeout(() => {
            waveIntro.classList.add('fade-out');
            setTimeout(onComplete, 1200);
          }, 700);
        }
      }
      requestAnimationFrame(step);
    }

    /* ── INTRO SEQUENCE ── */
    const intro    = document.getElementById('intro');
    const beginBtn = document.getElementById('begin-btn');
    const pageWrap = document.getElementById('page-wrap');

    beginBtn.addEventListener('click', () => {
      intro.classList.add('fade-away');
      setTimeout(() => {
        waveIntro.classList.add('active');
        animateWave(() => {
          waveIntro.style.display = 'none';
          pageWrap.classList.add('visible');
          setTimeout(() => intro.remove(), 500);
        });
      }, 400);
    });

    /* ── DEMO ── */
    const tagline   = document.getElementById('tagline');
    const overlay   = document.getElementById('demo-overlay');
    const demoWord  = document.getElementById('demo-word');
    const videoWrap = document.getElementById('demo-video-wrap');
    const closeBtn  = document.getElementById('demo-close');
    const hero      = document.getElementById('hero');
    const nav       = document.getElementById('main-nav');
    const footer    = document.getElementById('main-footer');
    const emailLink = document.getElementById('email-link');

    function openDemo() {
      hero.classList.add('fade-out');
      nav.classList.add('hidden');
      footer.classList.add('fade-out');
      setTimeout(() => overlay.classList.add('visible'), 300);
      setTimeout(() => demoWord.classList.add('expanded'), 500);
      setTimeout(() => videoWrap.classList.add('visible'), 800);
    }

    function closeDemo() {
      videoWrap.classList.remove('visible');
      demoWord.classList.remove('expanded');
      setTimeout(() => overlay.classList.remove('visible'), 300);
      setTimeout(() => {
        hero.classList.remove('fade-out');
        nav.classList.remove('hidden');
        footer.classList.remove('fade-out');
      }, 700);
      // email glow: 2s delay, builds in slowly, then pulses
      setTimeout(() => {
        emailLink.style.transition = 'box-shadow 1.5s ease, border-color 1.5s ease, color 0.3s';
        emailLink.style.boxShadow = '0 0 16px rgba(255,255,255,0.8), 0 0 40px rgba(180,210,255,0.5)';
        emailLink.style.borderColor = 'rgba(255,255,255,0.9)';
        emailLink.style.color = '#fff';
        setTimeout(() => {
          emailLink.style.transition = '';
          emailLink.style.boxShadow = '';
          emailLink.style.borderColor = '';
          emailLink.classList.add('email-glow');
          setTimeout(() => {
            emailLink.classList.remove('email-glow');
            emailLink.style.color = '';
          }, 6000);
        }, 1600);
      }, 2000);
    }

    tagline.addEventListener('click', openDemo);
    closeBtn.addEventListener('click', closeDemo);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDemo(); });
  </script>
